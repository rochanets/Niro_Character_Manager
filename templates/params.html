{% extends "base.html" %}
{% block title %}Parâmetros — Niro{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h2><span class="rune">&#x16C7;</span> Parâmetros</h2>
    <p class="page-sub">Regiões, afiliações, elementos, armas e roles do mundo de Niro</p>
  </div>
  <div style="display:flex; gap:10px">
    <a href="/api/export" class="btn">&#x16DF; Exportar tudo (.zip)</a>
    <button class="btn" id="import-btn">&#x16DE; Importar backup</button>
    <input type="file" id="import-file" accept=".zip" hidden>
  </div>
</div>

<div class="tabs" id="param-tabs">
  <span class="tab active" data-type="region">Regiões</span>
  <span class="tab" data-type="affiliation">Afiliações</span>
  <span class="tab" data-type="element">Elementos</span>
  <span class="tab" data-type="weapon">Armas</span>
  <span class="tab" data-type="role">Roles</span>
</div>

<div class="param-add glass" id="param-add"></div>
<div class="param-list" id="param-list"></div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/params.js') }}"></script>
{% endblock %}
