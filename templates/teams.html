{% extends "base.html" %}
{% block title %}Times — Niro{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h2><span class="rune">&#x16DF;</span> Times</h2>
    <p class="page-sub">Times de 4 personagens &middot; um personagem só pode estar em um time por vez</p>
  </div>
  <div class="page-header-actions">
    <div class="seg-toggle" id="team-cols-toggle">
      <button type="button" class="seg-btn" data-cols="2" title="2 times por linha">2</button>
      <button type="button" class="seg-btn" data-cols="4" title="4 times por linha">4</button>
    </div>
    <button class="btn" id="combos-btn">Combinações</button>
    <button class="btn primary" id="new-team-btn">+ Cadastrar Time</button>
  </div>
</div>

<div class="elem-filter-bar" id="elem-filter-bar"></div>

<div class="team-grid" id="team-grid">
  <div class="empty-state"><span class="rune">&#x16DF;</span>Carregando...</div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/teams.js') }}"></script>
{% endblock %}
